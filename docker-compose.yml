services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: paybridge-loan-svc
    ports:
      - "8084:8084"
    volumes:
      - .:/app
      - ~/.m2:/root/.m2
    # load semua all env from .env
    env_file:
      - .env
    environment:
      # override
      OTEL_SERVICE_NAME: paybridge-loan-service
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://paybridge-otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none

      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
    networks:
      - paybridge_network

networks:
  paybridge_network:
    external: true